name: Build

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

jobs:
  cli:
    name: CLI ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build CLI
        run: cargo build -p ops-insight-core --release --locked

      - name: Test core
        run: cargo test -p ops-insight-core --locked

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v6
        with:
          name: ops-insight-cli-${{ matrix.os }}
          path: |
            target/release/ops-insight
            target/release/ops-insight.exe
          if-no-files-found: error

      - name: Upload CLI release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/release/ops-insight
            target/release/ops-insight.exe

  desktop:
    name: Desktop ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-intel
            runner: macos-15-intel
            bundle_glob: |
              src-tauri/target/release/bundle/dmg/*.dmg
              target/release/bundle/dmg/*.dmg
          - name: macos-arm64
            runner: macos-15
            bundle_glob: |
              src-tauri/target/release/bundle/dmg/*.dmg
              target/release/bundle/dmg/*.dmg
          - name: windows-x64
            runner: windows-latest
            bundle_glob: |
              src-tauri/target/release/bundle/msi/*.msi
              target/release/bundle/msi/*.msi
              src-tauri/target/release/bundle/nsis/*.exe
              target/release/bundle/nsis/*.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version '^2' --locked

      - name: Build desktop app
        run: cargo tauri build --verbose
        working-directory: src-tauri

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ops-insight-desktop-${{ matrix.name }}
          path: ${{ matrix.bundle_glob }}
          if-no-files-found: error

      - name: Upload desktop release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.bundle_glob }}
