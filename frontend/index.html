<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ops-insight</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Tab bar -->
  <nav>
    <button class="tab active" data-tab="generate">生成报告</button>
    <button class="tab" data-tab="report">报告详情</button>
    <button class="tab" data-tab="config">配置管理</button>
  </nav>

  <!-- ── Tab: Generate ──────────────────────────────────── -->
  <section id="tab-generate" class="panel active">

    <div class="form-group">
      <label>报告类型</label>
      <div class="radio-group">
        <label class="radio-btn">
          <input type="radio" name="rtype" value="daily" checked>
          <span>昨日报告</span>
        </label>
        <label class="radio-btn">
          <input type="radio" name="rtype" value="weekly">
          <span>周报告（7天）</span>
        </label>
        <label class="radio-btn">
          <input type="radio" name="rtype" value="custom">
          <span>自定义范围</span>
        </label>
        <label class="radio-btn">
          <input type="radio" name="rtype" value="serilog">
          <span>Serilog 文件</span>
        </label>
      </div>
    </div>

    <!-- Custom range options -->
    <div id="custom-opts" class="extra-opts">
      <div>
        <label style="font-size:12px;color:var(--text-muted);margin-bottom:4px;display:block">开始日期</label>
        <input type="date" id="custom-from">
      </div>
      <div>
        <label style="font-size:12px;color:var(--text-muted);margin-bottom:4px;display:block">结束日期</label>
        <input type="date" id="custom-to">
      </div>
    </div>

    <!-- Serilog options -->
    <div id="serilog-opts" class="extra-opts" style="flex-direction:column;align-items:flex-start">
      <div class="file-pick-row">
        <button class="btn btn-secondary" id="pick-file-btn" style="font-size:13px;padding:6px 12px">选择日志路径</button>
        <span id="serilog-path-label">未选择</span>
      </div>
      <div style="display:flex;gap:12px;margin-top:10px;flex-wrap:wrap">
        <div>
          <label style="font-size:12px;color:var(--text-muted);margin-bottom:4px;display:block">开始日期（可选）</label>
          <input type="date" id="serilog-from">
        </div>
        <div>
          <label style="font-size:12px;color:var(--text-muted);margin-bottom:4px;display:block">结束日期（可选）</label>
          <input type="date" id="serilog-to">
        </div>
      </div>
    </div>

    <div style="margin-top:24px">
      <button class="btn" id="run-btn">生成报告</button>
    </div>

    <div class="progress" id="progress">
      <div class="spinner"></div>
      <span>正在分析中，请稍候…</span>
    </div>

    <div class="error-banner" id="error-banner"></div>

  </section>

  <!-- ── Tab: Report ────────────────────────────────────── -->
  <section id="tab-report" class="panel">

    <div id="report-empty" class="empty-state">还没有报告，请先在「生成报告」页面运行分析。</div>

    <div id="report-content" style="display:none">
      <div class="report-header">
        <h1 id="report-title"></h1>
        <div class="report-meta" id="report-period"></div>
        <div class="report-summary" id="report-summary"></div>
      </div>

      <div class="section-title">
        发现问题 <span id="issue-count" style="font-size:13px;font-weight:400"></span>
      </div>
      <div id="issues-list"></div>

      <div class="section-title">
        优化建议 <span id="suggestion-count" style="font-size:13px;font-weight:400"></span>
      </div>
      <div id="suggestions-list"></div>
    </div>

  </section>

  <!-- ── Tab: Config ────────────────────────────────────── -->
  <section id="tab-config" class="panel">

    <div class="form-group">
      <label>配置文件路径</label>
      <div class="config-path" id="config-path-display">加载中…</div>
    </div>

    <div class="form-group">
      <label>编辑配置（API Key 字段请直接修改文件或使用 macOS Keychain 存储）</label>
      <textarea id="config-editor" rows="22" spellcheck="false" placeholder="配置文件内容加载中…"></textarea>
    </div>

    <div class="config-actions">
      <button class="btn" id="save-config-btn">保存</button>
      <button class="btn btn-secondary" id="init-config-btn">生成配置模板</button>
      <button class="btn btn-secondary" id="reload-config-btn">重新加载</button>
    </div>

    <div class="config-note" id="config-msg"></div>

  </section>

  <script type="module" src="main.js"></script>
</body>
</html>
